<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/><title>Category Rush</title><link rel="stylesheet" href="style.css"/></head><body>
<div class="bg"></div>
<main class="app">
  <section class="hero" id="joinView">
    <div class="brand"><span>⚡</span><div><h1>Category Rush</h1><p>Think fast. Score big.</p></div></div>
    <div class="panel glass">
      <label>Your name</label><input id="nameInput" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="e.g. Kofi" maxlength="20"/>
      <button id="createBtn" class="primary">Create Room</button>
      <div class="joinLine"><input id="roomInput" autocomplete="off" autocapitalize="characters" autocorrect="off" spellcheck="false" placeholder="ROOM CODE" maxlength="6"/><button id="joinBtn">Join</button></div>
      <p id="joinError" class="error"></p>
    </div>
  </section>

  <section id="gameView" class="hidden">
    <header class="topbar glass"><div><h2>Category Rush</h2><p>Room <b id="roomCode">----</b></p></div><div class="letter"><small>Letter</small><strong id="letterBox">?</strong></div></header>
    <div id="notice" class="notice hidden"></div>
    <div id="rushBanner" class="rushBanner hidden"><div>🚨 <b id="rushName">Someone</b> started the Rush!</div><strong id="rushCount">5</strong></div>
    <div class="grid">
      <aside class="glass side"><h3>Players</h3><div id="players"></div><h3>Leaderboard</h3><div id="leaderboard"></div><h3>Used Letters</h3><div id="usedLetters" class="chips"></div></aside>
      <section class="glass board">
        <div class="controls"><button id="startBtn" class="primary">Start Round</button><button id="rushBtn" class="danger">RUSH!</button><button id="endBtn">End Game</button></div>
        <p id="statusText" class="status">Waiting in lobby…</p>
        <div class="answers">
          <label>Name<input data-cat="name" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="Name"/></label>
          <label>Animal<input data-cat="animal" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="Animal"/></label>
          <label>Place<input data-cat="place" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="City, country, state, province, region"/></label>
          <label>Object<input data-cat="object" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="Physical object"/></label>
        </div>
        <div id="results" class="results"></div>
      </section>
    </div>
  </section>
</main>
<div id="modal" class="modal hidden"><div class="modalCard"><button id="closeModal" class="x">×</button><h2>⚠️ Challenge</h2><p id="modalText"></p><div id="voteBtns"><button id="voteValid" class="primary">Count It</button><button id="voteInvalid" class="danger">Reject</button></div><p id="modalHint"></p></div></div>
<script src="/socket.io/socket.io.js"></script><script src="script.js"></script>
</body></html>
