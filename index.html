<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Category Rush</title><link rel="stylesheet" href="style.css"></head><body>
<div id="toast"></div><div id="modal" class="modal hidden"><div class="modal-card"><h2 id="modalTitle">Challenge</h2><p id="modalBody"></p><div id="modalButtons"></div></div></div>
<main class="app"><section class="hero"><div><h1>Category Rush</h1><p>Think fast. Score big. Beat the rush.</p></div><div class="pill" id="connection">Connecting...</div></section>
<section id="joinScreen" class="panel"><h2>Play</h2><input id="nameInput" placeholder="Your name" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"><button id="createBtn">Create Room</button><div class="join-row"><input id="roomInput" placeholder="Room code" maxlength="6" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"><button id="joinBtn">Join</button></div><p class="hint">Use the same link and room code. Room codes are uppercase.</p></section>
<section id="gameScreen" class="hidden"><div class="topbar"><div><span class="label">Room</span><strong id="roomCode">----</strong></div><div><span class="label">Letter</span><strong id="letter">-</strong></div><div><span class="label">Round</span><strong id="roundNo">0</strong></div></div>
<div class="grid"><section class="panel game"><div class="controls"><button id="startBtn">Start Round</button><button id="scoreBtn" class="secondary">Lock & Score</button><button id="endBtn" class="danger">End Game</button></div><p class="used">Used letters: <span id="usedLetters">None</span></p><div id="rushBanner" class="rush hidden"></div><div class="answers"><label>Name<input data-cat="name" class="answer" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></label><label>Animal<input data-cat="animal" class="answer" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></label><label>Place<input data-cat="place" class="answer" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></label><label>Object<input data-cat="object" class="answer" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></label></div><button id="rushBtn" class="rushBtn">RUSH!</button></section>
<aside class="panel"><h2>Leaderboard</h2><ol id="leaderboard"></ol><h3>Players</h3><div id="players"></div></aside></div>
<section id="resultsPanel" class="panel hidden"><h2>Results</h2><div id="results"></div></section>
<section id="challengesPanel" class="panel hidden"><h2>Challenges</h2><div id="challenges"></div></section>
</section></main><script src="/socket.io/socket.io.js"></script><script src="script.js"></script></body></html>
