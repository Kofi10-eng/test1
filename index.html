<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Category Rush</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="toast"></div>
<div id="challengeModal" class="modal hidden"></div>
<main class="app">
  <section id="joinScreen" class="hero card">
    <div class="badge">⚡ Multiplayer word battle</div>
    <h1>Category<br>Rush</h1>
    <p>Think fast. Score big.</p>
    <input id="playerName" placeholder="Your name" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
    <button id="createBtn" class="primary">Create room</button>
    <input id="roomInput" placeholder="Room code" maxlength="4" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" />
    <button id="joinBtn" class="secondary">Join room</button>
  </section>

  <section id="gameScreen" class="hidden layout">
    <aside class="side card">
      <h2>Category Rush</h2>
      <div class="roomBig">Room <b id="roomCode">----</b></div>
      <button id="copyBtn" class="small">Copy code</button>
      <h3>Players</h3><div id="players"></div>
      <h3>Leaderboard</h3><div id="leaderboard"></div>
    </aside>
    <section class="main card">
      <div class="topbar">
        <div><span class="label">Letter</span><div id="letter" class="letter">?</div><small id="usedLetters">Used: none</small></div>
        <div class="actions"><button id="startBtn" class="primary">Start Round</button><button id="rushBtn" class="danger">RUSH!</button><button id="endRoundBtn" class="secondary">Score Now</button><button id="endGameBtn" class="ghost">End Game</button></div>
      </div>
      <div id="rushBanner" class="rush hidden"></div>
      <p id="status" class="status">Create or join a room.</p>
      <div class="answerGrid">
        <label>Name<input data-cat="name" placeholder="Name" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></label>
        <label>Animal<input data-cat="animal" placeholder="Animal" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></label>
        <label>Place<input data-cat="place" placeholder="Country, city, state, province, region" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></label>
        <label>Object<input data-cat="object" placeholder="Physical object" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></label>
      </div>
      <div id="results"></div>
    </section>
  </section>
</main>
<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
