<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Category Rush</title><link rel="stylesheet" href="/style.css"></head><body><main id="app"><section id="home" class="screen active"><div class="hero"><div class="pill">⚡ Multiplayer word battle</div><h1>Category<br>Rush</h1><p>Think fast. Score big.</p><div class="card"><label>Your name</label><input id="name" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Enter name"><button id="create">Create room</button><button id="join">Join room</button><input id="code" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" placeholder="Room code"><b id="homeMsg"></b></div></div></section><section id="game" class="screen"><div class="top card"><div><small>ROOM CODE</small><h2 id="roomCode">----</h2></div><button id="copy">Copy code</button><button id="start">Start round</button><button id="end">End game</button></div><div class="grid"><div class="card"><small>RANDOM LETTER</small><div id="letter">?</div><p>Used letters: <span id="used">none</span></p></div><div class="card"><small>ROUND STATUS</small><h2 id="status">Start when everyone has joined</h2><div id="countdown"></div></div></div><div class="card"><small>YOUR ANSWERS</small><h2>Fill all 4 categories</h2><p class="tag">Auto-saves</p><input class="ans" data-cat="name" placeholder="👤 Name" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"><input class="ans" data-cat="animal" placeholder="🦁 Animal" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"><input class="ans" data-cat="place" placeholder="🌍 Place" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"><input class="ans" data-cat="object" placeholder="📦 Object" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"><button id="rush" class="rush">RUSH!</button></div><div class="card"><small>PLAYERS / LEADERBOARD</small><div id="players"></div></div><div class="card" id="resultsCard"><small>RESULTS</small><div id="results"></div></div></section></main><div id="modal" class="modal hidden"><div class="box"><h2>⚠️ Challenge</h2><p id="challengeText"></p><button id="voteCount">Count it</button><button id="voteReject">Reject</button><button id="closeModal">Close</button></div></div><script src="/socket.io/socket.io.js"></script><script src="/script.js"></script></body></html>
